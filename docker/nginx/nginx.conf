user www-data;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    log_format json escape=json
        '{"ts":"$time_iso8601","remote":"$remote_addr","method":"$request_method","path":"$request_uri",'
        '"status":$status,"bytes":$body_bytes_sent,"ua":"$http_user_agent","rt":$request_time}';
    access_log /dev/stdout json;

    client_body_temp_path /var/lib/nginx/tmp;
    proxy_temp_path /var/lib/nginx/tmp;
    fastcgi_temp_path /var/lib/nginx/tmp;
    uwsgi_temp_path /var/lib/nginx/tmp;
    scgi_temp_path /var/lib/nginx/tmp;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30s;
    client_max_body_size 8m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    include /etc/nginx/http.d/*.conf;
}
