name: Infra Drift Detection
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check'
        required: true
        type: choice
        options:
          - dev
          - prd
        default: dev
permissions:
  contents: read
  issues: write

jobs:
  drift-detection:
    name: Detect Terraform Drift
    runs-on: ubuntu-latest
    env:
      ENV: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config=env/${ENV}/backend.tfbackend

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        continue-on-error: true
        run: |
          set +e
          terraform plan -var-file=env/${ENV}/terraform.tfvars -detailed-exitcode -no-color -out=tfplan.binary > plan_output.txt 2>&1
          EXIT_CODE=$?
          set -e
          
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "drift_status=none" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "drift_status=drift" >> "$GITHUB_OUTPUT"
          else
            echo "drift_status=error" >> "$GITHUB_OUTPUT"
          fi

      - name: Open GitHub Issue on drift
        if: steps.plan.outputs.drift_status == 'drift'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `## :rotating_light: Terraform Drift Detected (${process.env.ENV})`,
              `**Detected at:** ${new Date().toISOString()}`,
              `**Action Run:** [View Logs](${runUrl})`,
              '',
              'AWS resources have changed outside of Terraform. Review the logs above to see the diff and resolve the drift.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DRIFT] ${process.env.ENV} drift detected`,
              body: body,
              labels: ['drift', 'security']
            });
